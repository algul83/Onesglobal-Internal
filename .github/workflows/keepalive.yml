name: Keep Streamlit Apps Awake (Playwright)

on:
  schedule:
    # 4시간마다 (KST 01:00, 05:00, 09:00, 13:00, 17:00, 21:00)
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null
          npm install --silent playwright
          npx playwright install --with-deps chromium

      - name: Ping all apps (real WebSocket activity)
        run: node .github/scripts/keepalive.js
