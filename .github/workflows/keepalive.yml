name: Keep Streamlit Apps Awake

on:
  schedule:
    # 4시간마다 실행 (KST 01:00, 05:00, 09:00, 13:00, 17:00, 21:00)
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ping all Streamlit apps (real container hit with cookie jar)
        run: |
          # Streamlit Cloud는 첫 요청에 세션 쿠키 발급 + redirect chain.
          # 쿠키 없이 -L 사용 시 무한 루프 → timeout 후 가짜 success.
          # 쿠키 jar로 세션 유지하며 redirect 따라가야 HTTP 200으로 컨테이너 도달.
          urls=(
            "https://onesglobal-recruit.streamlit.app"
            "https://onesglobal-accounting.streamlit.app"
            "https://connectdi-dashboard.streamlit.app"
            "https://onesglobal.streamlit.app"
          )
          failures=0
          for url in "${urls[@]}"; do
            COOKIES=$(mktemp)
            code=$(curl -sL -c "$COOKIES" -b "$COOKIES" -o /dev/null \
              -w "%{http_code}" --max-time 60 "$url" || echo "000")
            rm -f "$COOKIES"
            if [ "$code" = "200" ]; then
              echo "✅ $code  $url"
            else
              echo "❌ $code  $url"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            echo ""
            echo "⚠️ $failures개 앱 ping 실패"
            exit 1
          fi
